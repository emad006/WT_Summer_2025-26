<!DOCTYPE html>

<html>

<head>
    <title>Lab Task One</title>
</head>

<body>
    <center>
        <h1>Internship Application Form</h1>
    </center>

    <form>
        <center>
            <table>
                <tr>
                    <td>Student Name:</td>
                    <td><input type="text" required></td>
                </tr>

                <tr>
                    <td>Student Email:</td>
                    <td><input type="email" required></td>
                </tr>

                <tr>
                    <td>Preferred Internship Type:</td>
                    <td>
                        <input type="radio"> On-Site
                        <input type="radio"> Remote
                    </td>
                </tr>

                <tr>
                    <td>Internship Duration:</td>
                    <td>
                        <select>
                            <option>6 Weeks</option>
                            <option>3 Months</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Skills of Interest:</td>
                    <td><input type="checkbox"> Web Development
                        <input type="checkbox"> Data Analysis
                        <input type="checkbox"> Mobile Apps
                    </td>
                </tr>

                <tr>
                    <td>Submit</td>
                    <td><input type="submit"></td>
                </tr>
            </table>
        </center>
    </form>
</body>

</html>
